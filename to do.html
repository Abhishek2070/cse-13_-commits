<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List App</title>

    <!-- CSS -->
    <link rel="stylesheet" href="to do.css.css">

    <!-- Font Awesome Icons -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

<div class="container">

    <div class="todo-app">

        <h1>
            <i class="fa-solid fa-list-check"></i>
            My To-Do List
        </h1>

        <!-- Input Area -->
        <div class="row">

            <input
                type="text"
                id="taskInput"
                placeholder="Add a new task...">

            <button id="addBtn">
                Add
            </button>

        </div>

        <!-- Filters -->
        <div class="filters">

            <button class="filter active" data-filter="all">
                All
            </button>

            <button class="filter" data-filter="pending">
                Pending
            </button>

            <button class="filter" data-filter="completed">
                Completed
            </button>

        </div>

        <!-- Task List -->
        <ul id="taskList">

            <!-- Tasks will appear here -->

        </ul>

        <!-- Footer -->
        <div class="footer">

            <span id="taskCount">
                0 Tasks
            </span>

            <button id="clearCompleted">
                Clear Completed
            </button>

        </div>

    </div>

</div>

<!-- JavaScript -->
<script src="to do.js"></script>

</body>
</html>
